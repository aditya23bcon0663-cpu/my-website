<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Louis avatar">
  <defs>
    <linearGradient id="skin" x1="0" x2="1">
      <stop offset="0%" stop-color="#FFD8B5" />
      <stop offset="100%" stop-color="#FFB089" />
    </linearGradient>
    <linearGradient id="hair" x1="0" x2="1">
      <stop offset="0%" stop-color="#2b241f" />
      <stop offset="100%" stop-color="#1a1513" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="64" fill="#FBFDFF" />

  <g transform="translate(64,72)" filter="url(#soft)">
    <!-- face -->
    <ellipse cx="192" cy="184" rx="148" ry="164" fill="url(#skin)" />

    <!-- hair (modern, side-swept) -->
    <path d="M92 132 C120 48, 314 44, 320 128 C322 170, 300 210, 208 214 C136 218, 100 190, 92 148 Z" fill="url(#hair)" />

    <!-- eyes with iris and highlight -->
    <g>
      <ellipse cx="160" cy="200" rx="20" ry="14" fill="#fff" />
      <ellipse cx="160" cy="200" rx="10" ry="8" fill="#3B2E2E" />
      <circle cx="156" cy="196" r="3" fill="#fff" />

      <ellipse cx="264" cy="200" rx="20" ry="14" fill="#fff" />
      <ellipse cx="264" cy="200" rx="10" ry="8" fill="#3B2E2E" />
      <circle cx="260" cy="196" r="3" fill="#fff" />
    </g>

    <!-- eyebrows -->
    <path d="M132 172 C150 160, 182 160, 196 168" stroke="#2b241f" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9" />
    <path d="M228 172 C246 160, 278 160, 292 168" stroke="#2b241f" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9" />

    <!-- nose subtle -->
    <path d="M216 214 C214 226, 212 234, 216 240" stroke="#c98b6b" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9" />

    <!-- smile -->
    <path d="M176 262 C204 290, 248 290, 276 262" stroke="#8b4b33" stroke-width="5" stroke-linecap="round" fill="none" />

    <!-- cheeks -->
    <ellipse cx="132" cy="248" rx="18" ry="10" fill="#ffceaf" opacity="0.22" />
    <ellipse cx="292" cy="248" rx="18" ry="10" fill="#ffceaf" opacity="0.22" />

    <!-- shirt -->
    <path d="M72 328 C120 372, 304 372, 352 328 L352 380 L72 380 Z" fill="#06b6d4" />
  </g>

  <rect x="8" y="8" width="496" height="496" rx="56" stroke="#EAF5FB" stroke-width="12" fill="none" />
</svg>
