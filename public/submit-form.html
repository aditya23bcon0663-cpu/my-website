<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Message Form</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0b57d0;
        --primary-hover: #0846a8;
        --border: #dbe4f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 45%, #e2e8f0 100%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 540px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.6rem;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 16px;
        font: inherit;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        padding: 12px 18px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-hover);
      }

      #status {
        margin-top: 14px;
        font-size: 0.95rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Send Message</h1>
      <p>Name aur Message submit karne ke liye form fill karein.</p>

      <form id="messageForm">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required placeholder="Enter your name" />

        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="Enter your message"></textarea>

        <button type="submit">Submit</button>
      </form>

      <div id="status" aria-live="polite"></div>
    </main>

    <script>
      const form = document.getElementById("messageForm");
      const statusBox = document.getElementById("status");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          name: document.getElementById("name").value.trim(),
          message: document.getElementById("message").value.trim(),
        };

        statusBox.textContent = "Sending...";

        try {
          const response = await fetch("http://localhost:4000/submit", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          const result = await response.json();

          if (!response.ok) {
            statusBox.textContent = `Error: ${result.message || "Unable to submit"}`;
            return;
          }

          statusBox.textContent = `Success: ${result.message}`;
          form.reset();
        } catch (error) {
          statusBox.textContent = "Network error: Backend is not reachable.";
          console.error("Submit error:", error);
        }
      });
    </script>
  </body>
</html>
